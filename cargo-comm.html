              purl: '38-5-grad',
              page_type: 'page',
              content:
                '\u003cgallery-slideshow limit-by="height" navigation="false" show-captions="false" transition-type="scrub">\u003cmedia-item hash="D2630467394897370707018446504324" limit-by="width" rotation="0" scale="100">\u003c/media-item>\u003cmedia-item hash="V2630467394971157683313284710788" limit-by="width" rotation="0" scale="100">\u003c/media-item>\u003cmedia-item hash="V2630467738966041169849003245956" limit-by="width" rotation="0" scale="100">\u003c/media-item>\u003cmedia-item hash="E2630467394952710939239575159172" limit-by="width" rotation="0" scale="100">\u003c/media-item>\u003c/gallery-slideshow>\u003ccolumn-set gutter="0.5rem" mobile-stack="false">\u003ccolumn-unit slot="0" span="8">\u003cspan class="bodycopy-bold">38.5 Grad\u003cbr />\n\u003cbr />\u003c/span>\nMeine Augen brennen - wie immer, wenn ich müde bin. Es ist 7:30. Die Kirche schlägt zweimal. Ich schliesse die schwere Holztür auf und binde sie mit einem Gummiband fest. Eine Bauernkonstruktion. An meinen Arbeitsschuhen klebt noch Rasen vom Vortag. Ich ziehe die roten Schnürsenkel fest, stecke Thermometer, Bepanthen und Wallwurzsalbe in die grosse Tasche meiner Arbeitshose. Die Tiere liegen im Stall, leises Schnaufen ist zu hören. Mit der linken Hand halte ich den Schwanz des Kalbes, mit der rechten führe ich das Thermometer langsam ein. Ein kurzes Zucken. Die Temperatur steigt: 36.8 - 37.5 - 37.9 - 38.3 - 38.4 - 38.5\u003cbr />\n\n\u003cbr />\n38.5 Blinken. Drei Pieptöne.\u003cbr />\nKein Fieber!\u003cbr />\n\u003cbr />\n\u003c/column-unit>\u003ccolumn-unit slot="1" span="4">\u003cdiv style="text-align: right">\u003ca href="#" rel="close-overlay">(Close)\u003c/a>\u003c/div>\u003c/column-unit>\u003c/column-set>',
